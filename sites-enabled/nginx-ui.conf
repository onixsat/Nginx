map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
server {
    server_name vps-3026dd85.vps.ovh.net;
    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vps-3026dd85.vps.ovh.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps-3026dd85.vps.ovh.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    error_page 402 =301 http://redir.vigaristas.pt/index.php;
    # Define the properties
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    set $valido 0;
    if ($proxy_add_x_forwarded_for = "192.168.0.1" ) {
        set $valido 1;
    }
    #return 403;
    if ($host = 51.91.248.109) {
        #return 301 https://$host$request_uri;
        set $valido 1;
    }
    # managed by Certbot
    if ($host = vps-3026dd85.vps.ovh.net) {
        #return 301 https://$host$request_uri;
        set $valido 1;
    }
    if ($valido = 0) {
        #return 200 '{"code":"1", "message": "Not Foundxxxxx"}';
        return 402;
    }
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:9000;
    }
}
